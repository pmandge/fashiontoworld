<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" role="img" aria-label="FashionToWorld">
  <title>FashionToWorld</title>
  <defs>
    <style>
      .ftw-text { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600; }
      .ftw-to { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 500; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Globe mark -->
  <g transform="translate(4,8)" fill="none" stroke="#C9A84C" stroke-width="1.6">
    <circle cx="20" cy="20" r="18"/>
    <line x1="2" y1="20" x2="38" y2="20"/>
    <path d="M20 2 A 26 26 0 0 1 20 38"/>
    <path d="M20 2 A 26 26 0 0 0 20 38"/>
  </g>
  <!-- small orbit arrow connecting to → world -->
  <path d="M44 20 h10 l-4 -4 m4 4 l-4 4" fill="none" stroke="#C9A84C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="62" y="36" class="ftw-text" font-size="30" fill="#0F0F0F">Fashion</text>
  <text x="186" y="34" class="ftw-to" font-size="11" fill="#C9A84C">TO</text>
  <text x="206" y="36" class="ftw-text" font-size="30" fill="#C9A84C">World</text>
</svg>

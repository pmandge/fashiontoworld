<style>
/* ===== Coupons directory — dark hero + premium code cards ===== */
.cp-hero {
  position: relative;
  background: radial-gradient(120% 140% at 50% 0%, #1a1712 0%, #0a0a0a 60%);
  color: #f5f2ec;
  padding: calc(var(--nav-h, 70px) + 64px) 0 56px;
  text-align: center;
  overflow: hidden;
  border-bottom: 1px solid rgba(201,168,76,0.18);
}
.cp-hero-inner { max-width: 820px; margin: 0 auto; padding: 0 28px; position: relative; z-index: 2; }
.cp-eyebrow {
  font-family: var(--font-sans, 'DM Sans', sans-serif);
  font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--gold, #c9a84c); margin-bottom: 18px;
}
.cp-hero h1 {
  font-family: var(--font-serif, 'Cormorant Garamond', serif);
  font-weight: 400; line-height: 1.04; margin: 0 0 18px;
  font-size: clamp(38px, 6vw, 72px); color: #fff;
}
.cp-hero h1 em { font-style: italic; color: var(--gold-light, #e8d5a3); }
.cp-hero p {
  font-family: var(--font-sans, 'DM Sans', sans-serif);
  font-size: 16px; line-height: 1.6; color: rgba(245,242,236,0.66);
  max-width: 560px; margin: 0 auto;
}
.cp-hero .cp-count { color: var(--gold-light, #e8d5a3); font-weight: 500; }

/* controls */
.cp-controls { max-width: 1120px; margin: 0 auto; padding: 32px 28px 8px; }
.cp-search {
  display: flex; align-items: center; gap: 10px; max-width: 520px; margin: 0 auto 8px;
  border: 1.5px solid #e3ddcd; border-radius: 40px; background: #fff; padding: 4px 4px 4px 20px;
}
.cp-search svg { flex: 0 0 auto; color: var(--text-muted, #6b6b6b); }
.cp-search input {
  flex: 1; border: none; outline: none; background: transparent;
  font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 15px; padding: 11px 0; color: var(--ink, #1a1410);
}
.cp-search button {
  border: none; background: var(--black, #0a0a0a); color: #fff; cursor: pointer;
  font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 13px; letter-spacing: 0.04em;
  text-transform: uppercase; padding: 11px 24px; border-radius: 40px; transition: background 0.2s;
}
.cp-search button:hover { background: var(--gold, #c9a84c); color: #0a0a0a; }

/* grid + cards */
.cp-wrap { max-width: 1120px; margin: 0 auto; padding: 16px 28px 80px; }
.cp-meta { font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 14px; color: var(--text-muted, #6b6b6b); margin-bottom: 20px; text-align: center; }
.cp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.cp-card {
  position: relative; display: flex; flex-direction: column;
  background: #fff; border: 1px solid #eee7d9; border-radius: 16px; padding: 22px 22px 20px;
  transition: transform .18s, box-shadow .18s, border-color .18s; overflow: hidden;
}
.cp-card:hover { transform: translateY(-3px); box-shadow: 0 14px 32px rgba(0,0,0,.08); border-color: #e0d8c4; }
.cp-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.cp-logo {
  width: 48px; height: 48px; border-radius: 11px; background: var(--cream, #f5f2ec); flex: 0 0 auto;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  font-family: var(--font-serif, 'Cormorant Garamond', serif); font-size: 22px; color: var(--gold, #c9a84c);
}
.cp-logo img { max-width: 76%; max-height: 76%; object-fit: contain; }
.cp-store { font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 13px; font-weight: 500; color: var(--ink, #1a1410); }
.cp-badge {
  display: inline-block; margin-top: 3px; font-family: var(--font-sans, 'DM Sans', sans-serif);
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--deal, #c0492f); background: rgba(192,73,47,0.08); padding: 2px 9px; border-radius: 20px;
}
.cp-title {
  font-family: var(--font-serif, 'Cormorant Garamond', serif); font-size: 19px; line-height: 1.22;
  color: var(--ink, #1a1410); margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.cp-expiry { font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 12px; color: var(--text-muted, #6b6b6b); margin-bottom: 16px; }
.cp-actions { margin-top: auto; display: flex; gap: 8px; }
.cp-code {
  flex: 1; display: flex; align-items: center; justify-content: space-between; gap: 8px;
  border: 1.5px dashed var(--gold, #c9a84c); border-radius: 9px; padding: 10px 14px; background: #fffdf7;
  font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 14px; font-weight: 600;
  letter-spacing: 0.06em; color: var(--ink, #1a1410); cursor: pointer; transition: background 0.15s;
}
.cp-code:hover { background: #fbf6e8; }
.cp-code .cp-copy { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--gold, #c9a84c); }
.cp-code.copied { background: #eef7ed; border-color: #5a9c6a; }
.cp-code.copied .cp-copy { color: #5a9c6a; }
.cp-nocode {
  flex: 1; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--line, #e3ddcd); border-radius: 9px; padding: 10px 14px; background: var(--cream, #f5f2ec);
  font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 12.5px; color: var(--text-muted, #6b6b6b);
}
.cp-go {
  flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px;
  background: var(--black, #0a0a0a); color: #fff; text-decoration: none; border-radius: 9px;
  padding: 10px 18px; font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 13px;
  letter-spacing: 0.03em; transition: background 0.18s;
}
.cp-go:hover { background: var(--gold, #c9a84c); color: #0a0a0a; }
.cp-more {
  display: block; margin: 44px auto 0; padding: 14px 44px; border: 1px solid var(--black, #0a0a0a);
  background: transparent; border-radius: 40px; font-family: var(--font-sans, 'DM Sans', sans-serif);
  font-size: 14px; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s;
}
.cp-more:hover { background: var(--black, #0a0a0a); color: #fff; }
.cp-more[disabled] { opacity: 0.4; cursor: default; }
.cp-empty { text-align: center; padding: 60px 20px; color: var(--text-muted, #6b6b6b); font-family: var(--font-sans, 'DM Sans', sans-serif); }
.cp-skel { background: linear-gradient(90deg,#f3efe6 25%,#ece6d8 50%,#f3efe6 75%); background-size: 200% 100%; animation: cpsh 1.3s infinite; border-radius: 16px; height: 196px; }
@keyframes cpsh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

@media (max-width: 980px) { .cp-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .cp-grid { grid-template-columns: 1fr; } .cp-hero h1 { font-size: clamp(32px,9vw,48px); } }
</style>

  <div class="cp-meta" id="cpMeta">Loading coupons…</div>

<script>
(function () {
  var grid = document.getElementById('cpGrid');
  var meta = document.getElementById('cpMeta');
  var moreBtn = document.getElementById('cpMore');
  var totalEl = document.getElementById('cpTotal');
  var searchEl = document.getElementById('cpSearch');
  var PER = 18;
  var ALL = [];
  var filtered = [];
  var shown = 0;

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}

  function storeDomain(name) {
    var slug = String(name || '').toLowerCase().replace(/\bww\b/g,'').replace(/&/g,'and').replace(/[^a-z0-9]+/g,'');
    return slug ? slug + '.com' : '';
  }

  function fmtExpiry(d) {
    if (!d) return '';
    var t = String(d).slice(0, 10);
    var dt = new Date(t + 'T00:00:00');
    if (isNaN(dt)) return '';
    var now = new Date(); now.setHours(0,0,0,0);
    var days = Math.round((dt - now) / 86400000);
    if (days < 0) return '';
    if (days === 0) return 'Ends today';
    if (days === 1) return 'Ends tomorrow';
    if (days <= 14) return 'Ends in ' + days + ' days';
    return 'Valid until ' + dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function cardHtml(c, i) {
    var store = c.advertiser_name || 'Store';
    var dom = storeDomain(store);
    var initial = store.trim().charAt(0).toUpperCase();
    var logo = c.logo
      ? '<img alt="' + esc(store) + '" loading="lazy" src="' + esc(c.logo) + '" onerror="this.onerror=null;this.src=\'https://logo.clearbit.com/' + dom + '\';this.onerror=function(){this.parentNode.textContent=\'' + esc(initial) + '\';}">'
      : (dom ? '<img alt="' + esc(store) + '" loading="lazy" src="https://logo.clearbit.com/' + dom + '" onerror="this.onerror=null;this.parentNode.textContent=\'' + esc(initial) + '\';">' : esc(initial));
    var disc = c.discount ? '<span class="cp-badge">' + esc(c.discount) + ' off</span>' : '';
    var expiry = fmtExpiry(c.date_end);
    var code = (c.promocode || '').trim();
    var go = c.url || '#';
    var codeBlock = code
      ? '<div class="cp-code" data-code="' + esc(code) + '" onclick="cpCopy(this)"><span>' + esc(code) + '</span><span class="cp-copy">Copy</span></div>'
      : '<div class="cp-nocode">No code needed</div>';
    return '<div class="cp-card">'
      + '<div class="cp-card-top"><div class="cp-logo">' + logo + '</div>'
      + '<div><div class="cp-store">' + esc(store) + '</div>' + disc + '</div></div>'
      + '<div class="cp-title">' + esc(c.name || 'Special offer') + '</div>'
      + (expiry ? '<div class="cp-expiry">' + expiry + '</div>' : '<div class="cp-expiry"></div>')
      + '<div class="cp-actions">' + codeBlock
      + '<a class="cp-go" href="' + esc(go) + '" target="_blank" rel="noopener sponsored">Shop ↗</a></div>'
      + '</div>';
  }

  window.cpCopy = function (el) {
    var code = el.getAttribute('data-code') || '';
    function done() {
      el.classList.add('copied');
      var lbl = el.querySelector('.cp-copy'); if (lbl) lbl.textContent = 'Copied';
      setTimeout(function () { el.classList.remove('copied'); if (lbl) lbl.textContent = 'Copy'; }, 1600);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(done).catch(done);
    } else {
      var t = document.createElement('textarea'); t.value = code; document.body.appendChild(t);
      t.select(); try { document.execCommand('copy'); } catch (e) {} document.body.removeChild(t); done();
    }
  };

  function render(reset) {
    if (reset) { grid.innerHTML = ''; shown = 0; }
    var slice = filtered.slice(shown, shown + PER);
    grid.insertAdjacentHTML('beforeend', slice.map(cardHtml).join(''));
    shown += slice.length;
    if (!filtered.length) {
      grid.innerHTML = '<div class="cp-empty">No coupons match that. Try another store or code.</div>';
      meta.textContent = ''; moreBtn.style.display = 'none'; return;
    }
    meta.textContent = 'Showing ' + shown + ' of ' + filtered.length + ' active codes';
    moreBtn.style.display = (shown < filtered.length) ? 'block' : 'none';
  }

  function applySearch() {
    var q = (searchEl.value || '').trim().toLowerCase();
    filtered = !q ? ALL.slice() : ALL.filter(function (c) {
      return (c.advertiser_name || '').toLowerCase().indexOf(q) > -1
          || (c.promocode || '').toLowerCase().indexOf(q) > -1
          || (c.name || '').toLowerCase().indexOf(q) > -1;
    });
    render(true);
  }

  function showSkeletons() {
    var s = ''; for (var i = 0; i < 9; i++) s += '<div class="cp-skel"></div>';
    grid.innerHTML = s;
  }

  moreBtn.addEventListener('click', function () { render(false); });
  document.getElementById('cpSearchBtn').addEventListener('click', applySearch);
  searchEl.addEventListener('keyup', function (e) { if (e.key === 'Enter') applySearch(); });

  showSkeletons();
  (function load() {
    if (!window.AdmitadAPI || !window.AdmitadAPI.getCoupons) {
      grid.innerHTML = '<div class="cp-empty">Could not load coupons. Please refresh.</div>'; meta.textContent = ''; return;
    }
    window.AdmitadAPI.getCoupons({ limit: 200 }).then(function (data) {
      var raw = (data && Array.isArray(data.coupons)) ? data.coupons : [];
      // Keep active, non-expired coupons; sort by soonest expiry then those with codes.
      var now = new Date(); now.setHours(0,0,0,0);
      ALL = raw.filter(function (c) {
        if (c.status && c.status !== 'active') return false;
        if (c.date_end) { var dt = new Date(String(c.date_end).slice(0,10) + 'T00:00:00'); if (!isNaN(dt) && dt < now) return false; }
        return true;
      });
      // Codes first, then by expiry soonest.
      ALL.sort(function (a, b) {
        var ac = a.promocode ? 0 : 1, bc = b.promocode ? 0 : 1;
        if (ac !== bc) return ac - bc;
        return String(a.date_end || '9999').localeCompare(String(b.date_end || '9999'));
      });
      filtered = ALL.slice();
      if (totalEl) totalEl.textContent = ALL.length;
      render(true);
    }).catch(function () {
      grid.innerHTML = '<div class="cp-empty">Could not load coupons. Please refresh.</div>'; meta.textContent = '';
    });
  })();
})();
</script>

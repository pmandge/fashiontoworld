<style>
  .saved-wrap{max-width:1280px;margin:0 auto;padding:120px 24px 80px;min-height:70vh}
  .saved-head{text-align:center;margin-bottom:36px}
  .saved-head .eyebrow{font-family:var(--font-sans,'DM Sans');font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-deep,#a8862f);font-weight:500}
  .saved-head h1{font-family:var(--font-serif,'Cormorant Garamond');font-size:clamp(34px,5vw,52px);font-weight:500;margin-top:8px;color:var(--ink,#1a1410)}
  .saved-head p{color:var(--text-muted,#6b6b6b);margin-top:10px;font-size:15px}
  .saved-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  @media(max-width:980px){.saved-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:560px){.saved-grid{grid-template-columns:1fr 1fr;gap:11px}}
  /* empty state */
  .saved-empty{text-align:center;padding:40px 20px 60px;max-width:440px;margin:0 auto}
  .saved-empty .heart-ic{width:70px;height:70px;margin:0 auto 22px;border-radius:50%;background:var(--cream,#f5f2ec);display:flex;align-items:center;justify-content:center}
  .saved-empty .heart-ic svg{width:32px;height:32px;fill:none;stroke:var(--gold-deep,#a8862f);stroke-width:1.5}
  .saved-empty h2{font-family:var(--font-serif,'Cormorant Garamond');font-size:28px;font-weight:500;color:var(--ink,#1a1410);margin-bottom:10px}
  .saved-empty p{color:var(--text-muted,#6b6b6b);font-size:15px;line-height:1.6;margin-bottom:26px}
  .saved-empty .btn-shop{display:inline-flex;align-items:center;gap:9px;background:var(--ink,#1a1410);color:#fff;padding:13px 28px;border-radius:30px;font-size:14px;font-weight:500;letter-spacing:.03em;text-decoration:none;transition:background .2s}
  .saved-empty .btn-shop:hover{background:var(--gold-deep,#a8862f)}
  .saved-count{font-size:13px;color:var(--text-muted,#6b6b6b);text-align:center;margin-bottom:24px}
  .saved-clear{display:inline-block;margin-left:10px;color:var(--deal,#c0492f);cursor:pointer;text-decoration:underline;font-size:13px}
</style>

<div class="saved-wrap">
  <div class="saved-head">
    <p class="eyebrow">Your Collection</p>
    <h1>Saved Items</h1>
    <p>Your hand-picked finds, ready when you are.</p>
  </div>

  <div id="savedCount" class="saved-count" style="display:none"></div>
  <div id="savedContent"></div>
</div>

<script>
(function () {
  var WISH_KEY = 'ftw_saved';
  function wishGet() { try { return JSON.parse(localStorage.getItem(WISH_KEY) || '[]'); } catch (e) { return []; } }
  function wishSet(list) { try { localStorage.setItem(WISH_KEY, JSON.stringify(list)); } catch (e) {} }
  function esc(s) { return (s || '').toString().replace(/[&<>"]/g, function (c) { return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]; }); }

  function updateBadge() {
    var n = wishGet().length;
    document.querySelectorAll('.botnav-saved-badge').forEach(function (b) {
      if (n > 0) { b.textContent = n > 99 ? '99+' : n; b.style.display = 'flex'; }
      else { b.style.display = 'none'; }
    });
  }

  function card(p) {
    var href = /^https?:/i.test(p.href || '') ? p.href : '#';
    var out = /^https?:/i.test(p.href || '');
    var imgStyle = "background:#efe9df center/cover no-repeat" + (p.img ? (" url('" + esc(p.img) + "')") : '');
    return '<article class="pcard" data-wid="' + esc(p.id) + '">' +
      '<div class="pcard-img" style="' + imgStyle + '">' +
      '<button class="pcard-heart on" data-wid="' + esc(p.id) + '" aria-label="Remove from saved"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>' +
      '</div>' +
      '<div class="pcard-body"><p class="pcard-brand">' + esc(p.brand || '') + '</p>' +
      '<h3 class="pcard-name">' + esc(p.name || '') + '</h3>' +
      '<p class="pcard-price">' + esc(p.price || '') + '</p></div>' +
      '<div class="pcard-foot"><a class="pcard-btn" href="' + href + '"' + (out ? ' target="_blank" rel="sponsored nofollow noopener"' : '') + '>Shop Now &#8594;</a></div></article>';
  }

  function render() {
    var list = wishGet();
    var countEl = document.getElementById('savedCount');
    var content = document.getElementById('savedContent');
    updateBadge();

    if (!list.length) {
      countEl.style.display = 'none';
      content.innerHTML =
        '<div class="saved-empty">' +
        '<div class="heart-ic"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></div>' +
        '<h2>No saved items yet</h2>' +
        '<p>Tap the &#9825; on any product to save it here. Build your wishlist and come back anytime &mdash; your picks stay on this device.</p>' +
        '<a class="btn-shop" href="/">Start browsing &#8594;</a>' +
        '</div>';
      return;
    }

    countEl.style.display = 'block';
    countEl.innerHTML = list.length + (list.length === 1 ? ' saved item' : ' saved items') +
      '<span class="saved-clear" id="clearAll">Clear all</span>';
    content.innerHTML = '<div class="saved-grid">' + list.map(card).join('') + '</div>';

    var clear = document.getElementById('clearAll');
    if (clear) clear.addEventListener('click', function () {
      if (confirm('Remove all saved items?')) { wishSet([]); render(); }
    });
  }

  // remove individual item when its heart is tapped
  document.addEventListener('click', function (e) {
    var h = e.target.closest('.pcard-heart');
    if (!h) return;
    e.preventDefault();
    var id = h.getAttribute('data-wid');
    var list = wishGet().filter(function (x) { return x.id !== id; });
    wishSet(list);
    render();
  });

  render();
})();
</script>

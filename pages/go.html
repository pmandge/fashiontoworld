<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Redirecting… — FashionToWorld</title>
<link rel="icon" type="image/svg+xml" href="/public/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#0a0a0a;--gold:#c9a84c;--cream:#f5f2ec;--ink:#1a1410;--muted:#6b6b6b;--serif:'Cormorant Garamond',serif;--sans:'DM Sans',sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:#e9e7e2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:#fff;max-width:440px;width:100%;border-radius:18px;padding:48px 38px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.12)}
  .logo{font-family:var(--serif);font-size:24px;margin-bottom:30px}
  .logo b{font-weight:600}.logo .g{color:var(--gold);font-style:italic;font-size:15px}.logo .w{color:var(--gold)}
  .spinner{width:54px;height:54px;margin:0 auto 26px;border:3px solid var(--cream);border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-family:var(--serif);font-size:30px;font-weight:400;color:var(--ink);margin-bottom:8px}
  h1 .store{color:var(--gold);font-style:italic}
  p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:8px}
  .bar{height:4px;background:var(--cream);border-radius:4px;margin:26px 0 10px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--gold);border-radius:4px;animation:fill 1.6s ease forwards}
  @keyframes fill{to{width:100%}}
  .fine{font-size:12px;color:#9a9a9a;margin-top:18px}
  .manual{margin-top:20px;font-size:13px}
  .manual a{color:var(--black);font-weight:500}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><b>Fashion</b> <span class="g">to</span> <span class="w">World</span></div>
    <div class="spinner"></div>
    <h1>Taking you to <span class="store" id="storeName">the store</span></h1>
    <p>You're being securely handed over to complete your purchase. The store's own checkout, shipping &amp; returns apply.</p>
    <div class="bar"><i></i></div>
    <p class="fine">Your order is placed directly with the store. FashionToWorld may earn a commission at no extra cost to you.</p>
    <div class="manual">Not redirected? <a id="manualLink" href="#">Continue &#8594;</a></div>
  </div>

  <script src="../public/js/api-config.js"></script>
  <script src="../public/js/admitad-api.js"></script>
  <script>
  (function () {
    var p = new URLSearchParams(location.search);
    var store = (p.get('store') || '').trim();
    var brand = (p.get('brand') || '').trim();
    var directUrl = (p.get('url') || '').trim();
    var label = store || brand || 'the store';
    document.getElementById('storeName').textContent = label;
    document.title = 'Redirecting to ' + label + ' — FashionToWorld';

    var fallback = 'search.html?' + (store ? 'advertiser=' + encodeURIComponent(store)
                                   : brand ? 'brand=' + encodeURIComponent(brand) : '');

    function go(url) {
      if (!url || !/^https?:/i.test(url)) { location.replace(fallback); return; }
      document.getElementById('manualLink').href = url;
      setTimeout(function () { location.replace(url); }, 1600);
    }

    if (directUrl && /^https?:/i.test(directUrl)) { go(directUrl); return; }

    if (window.AdmitadAPI && (store || brand)) {
      var opts = store ? { advertiser: store, limit: 1 } : { brand: brand, limit: 1 };
      window.AdmitadAPI.getProducts(opts).then(function (d) {
        var prod = (d && d.products && d.products[0]) || null;
        go(prod && (prod.affiliate_url || prod.url));
      }).catch(function () { go(''); });
    } else {
      location.replace(fallback);
    }
  })();
  </script>
</body>
</html>

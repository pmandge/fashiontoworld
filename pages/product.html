<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pdpTitle">Product — Fashion to World</title>
<meta name="description" id="pdpMetaDesc" content="Discover this piece from a worldwide-shipping store. Global delivery, prices in your currency.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"></noscript>
<link rel="stylesheet" href="../public/css/main.css">
<style>
.pdp-wrap { max-width: var(--max-w); margin: 0 auto; padding: calc(var(--nav-h) + 36px) 24px 60px; }
.pdp-crumb { font-family: var(--font-sans); font-size: 12.5px; color: var(--text-muted); letter-spacing: .02em; margin-bottom: 26px; }
.pdp-crumb a { color: var(--text-muted); text-decoration: none; }
.pdp-crumb a:hover { color: var(--gold-deep); }
.pdp-grid { display: grid; grid-template-columns: 1.05fr 1fr; gap: 56px; align-items: start; }
.pdp-gallery { position: sticky; top: calc(var(--nav-h) + 24px); }
.pdp-main-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 14px; background: #f1ece4; border: 1px solid rgba(201,168,76,.18); }
.pdp-thumbs { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.pdp-thumb { width: 64px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid rgba(201,168,76,.25); opacity: .7; transition: .2s; }
.pdp-thumb:hover, .pdp-thumb.on { opacity: 1; border-color: var(--gold); }
.pdp-info { padding-top: 6px; }
.pdp-brand { font-family: var(--font-sans); font-size: 12px; letter-spacing: .16em; text-transform: uppercase; color: var(--gold-deep); margin: 0 0 10px; }
.pdp-name { font-family: var(--font-serif); font-size: clamp(26px, 3.5vw, 40px); line-height: 1.1; color: var(--ink); margin: 0 0 18px; font-weight: 400; }
.pdp-price-row { display: flex; align-items: baseline; gap: 14px; margin: 0 0 8px; }
.pdp-price { font-family: var(--font-serif); font-size: 30px; color: var(--ink); font-weight: 500; }
.pdp-price-old { font-size: 18px; color: var(--text-muted); text-decoration: line-through; }
.pdp-save { font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: #8a5a1a; background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.35); border-radius: 30px; padding: 4px 12px; }
.pdp-retailer { font-family: var(--font-sans); font-size: 13.5px; color: var(--text-muted); margin: 6px 0 26px; }
.pdp-retailer b { color: var(--ink); font-weight: 500; }
.pdp-cta { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: var(--ink); color: var(--gold-light); font-family: var(--font-sans); font-weight: 600; font-size: 15px; letter-spacing: .03em; padding: 18px 28px; border-radius: 8px; text-decoration: none; transition: .2s; box-shadow: 0 12px 30px rgba(26,20,16,.18); }
.pdp-cta:hover { background: var(--gold); color: var(--ink); transform: translateY(-2px); box-shadow: 0 16px 36px rgba(201,168,76,.35); }
.pdp-cta:hover svg { stroke: var(--ink); }
.pdp-cta svg { width: 18px; height: 18px; }
.pdp-trust { display: flex; gap: 18px; flex-wrap: wrap; margin: 22px 0 0; padding: 18px 0 0; border-top: 1px solid rgba(201,168,76,.2); }
.pdp-trust-item { display: flex; align-items: center; gap: 7px; font-family: var(--font-sans); font-size: 12.5px; color: var(--text-muted); }
.pdp-trust-item svg { width: 16px; height: 16px; color: var(--gold-deep); }
.pdp-desc { margin: 28px 0 0; }
.pdp-desc h3 { font-family: var(--font-sans); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 10px; }
.pdp-desc p { font-family: var(--font-sans); font-size: 14.5px; line-height: 1.7; color: #3a352e; margin: 0; }
.pdp-meta { display: flex; gap: 26px; flex-wrap: wrap; margin: 22px 0 0; font-family: var(--font-sans); font-size: 13px; color: var(--text-muted); }
.pdp-meta b { color: var(--ink); font-weight: 500; }
.pdp-disc { font-family: var(--font-sans); font-size: 11.5px; color: var(--text-muted); margin: 24px 0 0; line-height: 1.55; }
.pdp-loading, .pdp-error { text-align: center; padding: 80px 20px; font-family: var(--font-serif); font-size: 22px; color: var(--text-muted); }
.pdp-email { margin: 34px 0 0; padding: 22px; background: #f5f0ea; border-radius: 12px; border: 1px solid rgba(201,168,76,.2); }
.pdp-email h4 { font-family: var(--font-serif); font-size: 19px; color: var(--ink); margin: 0 0 6px; font-weight: 500; }
.pdp-email p { font-family: var(--font-sans); font-size: 13px; color: var(--text-muted); margin: 0 0 14px; }
.pdp-email-row { display: flex; gap: 8px; }
.pdp-email-row input { flex: 1; border: 1px solid rgba(201,168,76,.4); border-radius: 8px; padding: 12px 14px; font-family: var(--font-sans); font-size: 14px; }
.pdp-email-row button { background: var(--gold); color: var(--ink); border: none; border-radius: 8px; padding: 12px 22px; font-family: var(--font-sans); font-weight: 600; font-size: 13.5px; cursor: pointer; white-space: nowrap; }
.pdp-email-row button:hover { background: var(--gold-deep); color: #fff; }
@media (max-width: 820px) {
  .pdp-grid { grid-template-columns: 1fr; gap: 30px; }
  .pdp-gallery { position: static; }
}
</style>
</head>
<body>
<nav class="nav" id="nav">
  <div class="nav-inner">
    <a class='logo' href='/'><span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg></span><span class="logo-fw">Fashion</span><span class="logo-to">to</span><span class="logo-w">World</span></a>
    <ul class="nav-links">
      <li><a href='/pages/women'>Women</a></li>
      <li><a href='/pages/men'>Men</a></li>
      <li><a href='/pages/shoes'>Shoes</a></li>
      <li><a href='/pages/bags'>Bags</a></li><li><a href='/pages/watches'>Watches</a></li>
      <li><a href='/pages/jewellery'>Jewellery</a></li>
      <li><a href='/pages/accessories'>Accessories</a></li>
    </ul>
    <div class="nav-spacer"></div>
    <div class="nav-actions">
      <form class="nav-search" onsubmit="return false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" placeholder="Search 169,000+ products…" aria-label="Search products" autocomplete="off"></form>
      <a class='btn-nav-cta' href='/pages/deals'>Shop Deals</a>
    </div>
    <button class="nav-burger" aria-label="Menu">
      <span class="burger-lines"><span></span><span></span><span></span></span>
      <span class="burger-label">Menu</span>
    </button>
  </div>
</nav>

<main class="pdp-wrap">
  <div class="pdp-crumb" id="pdpCrumb"><a href="/">Home</a> · <span id="pdpCrumbCat">Shop</span></div>
  <div id="pdpContent">
    <div class="pdp-loading">Loading…</div>
  </div>
</main>

<script src="../public/js/api-config.js" defer></script>
<script>
(function () {
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function param(n){ return new URLSearchParams(location.search).get(n); }

  var id = param('id');
  var content = $('pdpContent');
  if (!id) { content.innerHTML = '<div class="pdp-error">No product specified.</div>'; return; }

  function img(u, w){ if(!u) return ''; return 'https://images.weserv.nl/?url=' + encodeURIComponent(u.replace(/^https?:\/\//,'')) + '&w=' + (w||700) + '&output=webp&q=82'; }

  function render(p){
    var retailer = p.advertiser || p.brand || 'our partner store';
    var brand = p.brand || p.advertiser || '';
    var link = p.affiliate_url || p.url || '#';
    var priceMain = p.price_display || ((p.price ? Number(p.price).toFixed(2) : '') + ' ' + (p.display_currency || p.currency || ''));
    var priceOld = p.price_old_display || (p.price_old ? (Number(p.price_old).toFixed(2) + ' ' + (p.currency||'')) : '');
    var onSale = p.price_old && Number(p.price_old) > Number(p.price);
    var savePct = onSale ? Math.round((1 - Number(p.price)/Number(p.price_old)) * 100) : 0;
    var imgs = (p.images && p.images.length ? p.images : [p.image_url]).filter(Boolean);
    var mainImg = imgs[0];

    document.title = (p.name ? p.name.slice(0,60) + ' — ' : '') + 'Fashion to World';
    var md = $('pdpMetaDesc'); if (md) md.setAttribute('content', (brand ? brand + ' · ' : '') + (p.name||'') + ' — ships worldwide, priced in your currency.');
    var cc = $('pdpCrumbCat'); if (cc && p.category) cc.innerHTML = '<a href="/pages/'+esc(String(p.category).toLowerCase())+'">'+esc(p.category)+'</a>';

    var thumbs = imgs.length > 1 ? '<div class="pdp-thumbs">' + imgs.slice(0,6).map(function(u,k){
      return '<img class="pdp-thumb'+(k===0?' on':'')+'" src="'+img(u,140)+'" data-full="'+esc(img(u,800))+'" alt="view '+(k+1)+'">';
    }).join('') + '</div>' : '';

    content.innerHTML =
      '<div class="pdp-grid">' +
        '<div class="pdp-gallery">' +
          '<img id="pdpMainImg" class="pdp-main-img" src="'+img(mainImg,800)+'" alt="'+esc(p.name||'')+'">' +
          thumbs +
        '</div>' +
        '<div class="pdp-info">' +
          (brand ? '<p class="pdp-brand">'+esc(brand)+'</p>' : '') +
          '<h1 class="pdp-name">'+esc(p.name||'Product')+'</h1>' +
          '<div class="pdp-price-row">' +
            '<span class="pdp-price">'+esc(priceMain)+'</span>' +
            (onSale && priceOld ? '<span class="pdp-price-old">'+esc(priceOld)+'</span>' : '') +
            (savePct>0 ? '<span class="pdp-save">Save '+savePct+'%</span>' : '') +
          '</div>' +
          '<p class="pdp-retailer">Sold &amp; shipped by <b>'+esc(retailer)+'</b> — ships worldwide</p>' +
          '<a class="pdp-cta" id="pdpShopBtn" href="'+esc(link)+'" target="_blank" rel="nofollow noopener sponsored">Shop Now <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>' +
          '<div class="pdp-trust">' +
            '<span class="pdp-trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>Ships worldwide</span>' +
            '<span class="pdp-trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 6 9 17l-5-5"/></svg>Verified deal</span>' +
            '<span class="pdp-trust-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Price in your currency</span>' +
          '</div>' +
          (p.description ? '<div class="pdp-desc"><h3>Details</h3><p>'+esc(String(p.description).slice(0,900))+'</p></div>' : '') +
          '<div class="pdp-meta">' +
            (p.color ? '<span>Colour: <b>'+esc(p.color)+'</b></span>' : '') +
            (p.size ? '<span>Size: <b>'+esc(p.size)+'</b></span>' : '') +
            (p.material ? '<span>Material: <b>'+esc(p.material)+'</b></span>' : '') +
          '</div>' +
          '<div class="pdp-email">' +
            '<h4>Get deals like this first</h4>' +
            '<p>New markdowns from worldwide-shipping stores, straight to your inbox.</p>' +
            '<div class="pdp-email-row"><input type="email" id="pdpEmail" placeholder="you@email.com" aria-label="Email"><button id="pdpEmailBtn">Notify me</button></div>' +
          '</div>' +
          '<p class="pdp-disc">When you click “Shop Now”, you’ll be taken to the store to complete your purchase. We may earn a commission, at no extra cost to you.</p>' +
        '</div>' +
      '</div>';

    // thumbnail swap
    var thumbsEls = content.querySelectorAll('.pdp-thumb');
    thumbsEls.forEach(function(t){ t.addEventListener('click', function(){
      $('pdpMainImg').src = t.getAttribute('data-full');
      thumbsEls.forEach(function(x){ x.classList.remove('on'); }); t.classList.add('on');
    }); });

    // fire analytics + Pinterest outbound on shop click
    var btn = $('pdpShopBtn');
    if (btn) btn.addEventListener('click', function(){
      try { if (window.gtag) gtag('event', 'shop_click', { product_id: id, retailer: retailer }); } catch(e){}
      try { if (window.pintrk) pintrk('track', 'lead', { lead_type: 'outbound_'+retailer }); } catch(e){}
    });

    // email capture -> existing Brevo subscribe endpoint
    var ebtn = $('pdpEmailBtn');
    if (ebtn) ebtn.addEventListener('click', function(){
      var em = ($('pdpEmail').value||'').trim();
      if (!/.+@.+\..+/.test(em)) { $('pdpEmail').focus(); return; }
      ebtn.textContent = 'Sending…'; ebtn.disabled = true;
      var base = (window.API_BASE||'') ;
      fetch(base + '/api/subscribe', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email: em, source: 'pdp' }) })
        .then(function(){ ebtn.textContent = 'Check your inbox ✓'; })
        .catch(function(){ ebtn.textContent = 'Try again'; ebtn.disabled = false; });
    });
  }

  var API = (window.API_BASE || 'https://api.fashiontoworld.co');
  fetch(API + '/api/products/' + encodeURIComponent(id))
    .then(function(r){ if(!r.ok) throw new Error('not found'); return r.json(); })
    .then(function(d){ if (!d || !d.product) throw new Error('empty'); render(d.product); })
    .catch(function(){
      content.innerHTML = '<div class="pdp-error">Sorry — we couldn’t find this product. It may have sold out.<br><br><a class="btn-nav-cta" href="/pages/deals">Browse today’s deals →</a></div>';
    });
})();
</script>
<script src="../public/js/footer.js" defer></script>
<script src="../public/js/main.js" defer></script>
<script src="../public/js/mobile-menu.js" defer></script>
<script src="/public/js/cookie-consent.js" defer></script>
<script src="/public/js/nav-speed.js" defer></script>
<script src="/public/js/pin-events.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — FashionToWorld</title>
<meta name="description" content="Search 160,000+ fashion products from worldwide-shipping brands. Find dresses, shoes, bags, jewellery and more.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../public/css/main.css">
<style>
.search-hero {
  padding: calc(var(--nav-h) + 50px) 0 30px;
  background: var(--warm-ivory, #faf6ef);
  border-bottom: 0.5px solid var(--line);
}
.search-hero-inner { max-width: var(--max-w); margin: 0 auto; padding: 0 32px; }
.search-hero h1 { font-family: var(--font-serif); font-size: clamp(32px, 4vw, 52px); color: var(--ink, #1a1410); margin-bottom: 6px; }
.search-hero h1 em { color: var(--gold); font-style: italic; }
.search-box-big {
  display: flex; gap: 0; margin-top: 22px; max-width: 620px;
  border: 1.5px solid var(--black); border-radius: 8px; overflow: hidden; background: #fff;
}
.search-box-big input {
  flex: 1; border: none; padding: 15px 18px; font-family: var(--font-sans); font-size: 16px; outline: none;
}
.search-box-big button {
  background: var(--black); color: #fff; border: none; padding: 0 26px;
  font-family: var(--font-sans); font-size: 14px; font-weight: 500; letter-spacing: 0.04em;
  text-transform: uppercase; cursor: pointer; transition: background 0.2s;
}
.search-box-big button:hover { background: var(--deal, #c0492f); }
.search-suggest { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.search-suggest span { font-size: 13px; color: var(--text-muted); }
.search-suggest a {
  font-family: var(--font-sans); font-size: 13px; color: var(--text); text-decoration: none;
  border: 1px solid var(--line); padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
}
.search-suggest a:hover { border-color: var(--black); background: var(--black); color: #fff; }

.search-results { padding: 40px 0 80px; }
.search-toolbar {
  max-width: var(--max-w); margin: 0 auto 24px; padding: 0 32px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
}
.search-count { font-family: var(--font-sans); font-size: 15px; color: var(--text); }
.search-count strong { color: var(--ink, #1a1410); }
.sort-select { padding: 9px 14px; border: 1px solid var(--line); border-radius: 8px; font-family: var(--font-sans); font-size: 14px; cursor: pointer; }
.search-grid-wrap { max-width: var(--max-w); margin: 0 auto; padding: 0 32px; }
.btn-load { display: block; margin: 40px auto 0; padding: 14px 40px; border: 1px solid var(--black); background: transparent; border-radius: 30px; font-family: var(--font-sans); cursor: pointer; transition: all 0.2s; }
.btn-load:hover { background: var(--black); color: var(--white); }
.empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
.empty-state h3 { font-family: var(--font-serif); font-size: 26px; color: var(--ink, #1a1410); margin-bottom: 10px; }
.empty-state a { color: var(--gold); }
.btn-disabled { opacity: .5; cursor: not-allowed; }
</style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo"><span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg></span><span class="logo-fw">Fashion</span><span class="logo-to">to</span><span class="logo-w">World</span></a>
    <ul class="nav-links">
      <li><a href="women.html">Women</a></li>
      <li><a href="men.html">Men</a></li>
      <li><a href="shoes.html">Shoes</a></li>
      <li><a href="bags.html">Bags</a></li>
      <li><a href="jewellery.html">Jewellery</a></li>
      <li><a href="accessories.html">Accessories</a></li>
    </ul>
    <div class="nav-spacer"></div>
    <div class="nav-actions">
      <a href="deals.html" class="btn-nav-cta">Shop Deals</a>
    </div>
    <button class="nav-burger" aria-label="Menu">
      <span class="burger-lines"><span></span><span></span><span></span></span>
      <span class="burger-label">Menu</span>
    </button>
  </div>
</nav>

<section class="search-hero">
  <div class="search-hero-inner">
    <h1>Search <em id="searchTermTitle">Results</em></h1>
    <div class="search-box-big">
      <input type="text" id="searchInput" placeholder="Search dresses, shoes, bags, brands..." onkeyup="onSearchKey(event)">
      <button onclick="doSearch()">Search</button>
    </div>
    <div class="search-suggest">
      <span>Popular:</span>
      <a href="search.html?q=dress">Dresses</a>
      <a href="search.html?q=sneakers">Sneakers</a>
      <a href="search.html?q=handbag">Handbags</a>
      <a href="search.html?q=watch">Watches</a>
      <a href="search.html?q=sunglasses">Sunglasses</a>
    </div>
  </div>
</section>

<section class="search-results">
  <div class="search-toolbar">
    <span class="search-count" id="searchCount">Searching…</span>
    <select class="sort-select" id="sortSelect" onchange="changeSort()">
      <option value="popularity">Most Relevant</option>
      <option value="price_asc">Price: Low → High</option>
      <option value="price_desc">Price: High → Low</option>
      <option value="sale">Biggest Discount</option>
    </select>
  </div>
  <div class="search-grid-wrap">
    <div class="products-grid" id="searchGrid">
      <div class="loading-skeleton"></div><div class="loading-skeleton"></div>
      <div class="loading-skeleton"></div><div class="loading-skeleton"></div>
    </div>
    <button class="btn-load" id="loadMoreBtn" onclick="loadMore()" style="display:none">Load More</button>
  </div>
</section>

<footer class="footer" id="footer"></footer>

<script src="../public/js/api-config.js"></script>
<script src="../public/js/admitad-api.js"></script>
<script>
let currentQuery = '', currentSort = 'popularity', currentPage = 1;

(function init(){
  const params = new URLSearchParams(location.search);
  currentQuery = (params.get('q') || '').trim();
  document.getElementById('searchInput').value = currentQuery;
  document.getElementById('searchTermTitle').textContent = currentQuery ? `"${currentQuery}"` : 'Results';
  document.title = currentQuery ? `${currentQuery} — Search — FashionToWorld` : 'Search — FashionToWorld';
  if (currentQuery) runSearch(1, true);
  else {
    document.getElementById('searchGrid').innerHTML = '<div class="empty-state"><h3>What are you looking for?</h3><p>Search across 160,000+ products from worldwide-shipping brands.</p></div>';
    document.getElementById('searchCount').textContent = '';
  }
})();

function onSearchKey(e){ if (e.key === 'Enter') doSearch(); }
function doSearch(){
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  location.href = 'search.html?q=' + encodeURIComponent(q);
}
function changeSort(){ currentSort = document.getElementById('sortSelect').value; runSearch(1, true); }
function loadMore(){ currentPage++; runSearch(currentPage, false); }

async function runSearch(page = 1, reset = true){
  const grid = document.getElementById('searchGrid');
  if (reset){ grid.innerHTML = '<div class="loading-skeleton"></div>'.repeat(8); currentPage = 1; }

  const data = await AdmitadAPI.getProducts({ q: currentQuery, sort: currentSort, page, limit: 24 });
  const products = data?.products || [];
  const total = data?.total || 0;

  if (!products.length && reset){
    document.getElementById('searchCount').textContent = '';
    grid.innerHTML = '<div class="empty-state"><h3>No results for "' + currentQuery + '"</h3><p>Try a different word, or browse <a href="women.html">Women</a>, <a href="men.html">Men</a>, <a href="shoes.html">Shoes</a> or <a href="deals.html">Deals</a>.</p></div>';
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }

  document.getElementById('searchCount').innerHTML = '<strong>' + total.toLocaleString() + '</strong> results for "' + currentQuery + '"';
  if (reset) grid.innerHTML = products.map(AdmitadAPI.renderProductCard).join('');
  else grid.insertAdjacentHTML('beforeend', products.map(AdmitadAPI.renderProductCard).join(''));
  document.getElementById('loadMoreBtn').style.display = products.length < 24 ? 'none' : 'block';
}
</script>
<script src="../public/js/categories.js"></script>
<script src="../public/js/i18n.js"></script>
<script src="../public/js/site-content.js"></script>
<script src="../public/js/footer.js"></script>
<script src="../public/js/main.js"></script>
<script src="../public/js/mobile-menu.js"></script>
</body>
</html>

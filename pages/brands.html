<style>
/* ===== Brands directory — dark hero + premium grid ===== */
.br-hero {
  position: relative;
  background:
    radial-gradient(120% 140% at 50% 0%, #1a1712 0%, #0a0a0a 60%);
  color: #f5f2ec;
  padding: calc(var(--nav-h, 70px) + 64px) 0 56px;
  text-align: center;
  overflow: hidden;
  border-bottom: 1px solid rgba(201,168,76,0.18);
}
.br-hero-inner { max-width: 820px; margin: 0 auto; padding: 0 28px; position: relative; z-index: 2; }
.br-eyebrow {
  font-family: var(--font-sans, 'DM Sans', sans-serif);
  font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--gold, #c9a84c); margin-bottom: 18px;
}
.br-hero h1 {
  font-family: var(--font-serif, 'Cormorant Garamond', serif);
  font-weight: 400; line-height: 1.04; margin: 0 0 18px;
  font-size: clamp(38px, 6vw, 72px); color: #fff;
}
.br-hero h1 em { font-style: italic; color: var(--gold-light, #e8d5a3); }
.br-hero p {
  font-family: var(--font-sans, 'DM Sans', sans-serif);
  font-size: 16px; line-height: 1.6; color: rgba(245,242,236,0.66);
  max-width: 560px; margin: 0 auto;
}
.br-hero .br-count { color: var(--gold-light, #e8d5a3); font-weight: 500; }

/* search + A-Z controls */
.br-controls { max-width: 1180px; margin: 0 auto; padding: 32px 28px 8px; }
.br-search {
  display: flex; align-items: center; gap: 10px; max-width: 520px; margin: 0 auto 24px;
  border: 1.5px solid #e3ddcd; border-radius: 40px; background: #fff; padding: 4px 4px 4px 20px;
}
.br-search svg { flex: 0 0 auto; color: var(--text-muted, #6b6b6b); }
.br-search input {
  flex: 1; border: none; outline: none; background: transparent;
  font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 15px; padding: 11px 0; color: var(--ink, #1a1410);
}
.br-search button {
  border: none; background: var(--black, #0a0a0a); color: #fff; cursor: pointer;
  font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 13px; letter-spacing: 0.04em;
  text-transform: uppercase; padding: 11px 24px; border-radius: 40px; transition: background 0.2s;
}
.br-search button:hover { background: var(--gold, #c9a84c); color: #0a0a0a; }
.br-az { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-bottom: 8px; }
.br-az button {
  font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 13px; min-width: 30px;
  padding: 6px 8px; border: 1px solid transparent; border-radius: 7px; background: none; cursor: pointer;
  color: var(--text-muted, #6b6b6b); transition: all 0.15s;
}
.br-az button:hover { color: var(--ink, #1a1410); }
.br-az button.on { background: var(--ink, #1a1410); color: #fff; }

/* grid */
.br-wrap { max-width: 1180px; margin: 0 auto; padding: 16px 28px 80px; }
.br-meta { font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 14px; color: var(--text-muted, #6b6b6b); margin-bottom: 20px; text-align: center; }
.br-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
.br-card {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  background: #fff; border: 1px solid #eee7d9; border-radius: 14px; padding: 26px 16px 20px;
  text-decoration: none; color: inherit; transition: transform .18s, box-shadow .18s, border-color .18s;
}
.br-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,.08); border-color: #e0d8c4; }
.br-logo {
  width: 66px; height: 66px; border-radius: 14px; background: var(--cream, #f5f2ec);
  display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 14px;
  font-family: var(--font-serif, 'Cormorant Garamond', serif); font-size: 28px; color: var(--gold, #c9a84c);
}
.br-logo img { max-width: 74%; max-height: 74%; object-fit: contain; }
.br-name {
  font-family: var(--font-serif, 'Cormorant Garamond', serif); font-size: 19px; line-height: 1.18;
  color: var(--ink, #1a1410); margin-bottom: 5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.br-cnt { font-family: var(--font-sans, 'DM Sans', sans-serif); font-size: 12.5px; color: var(--gold, #c9a84c); font-weight: 500; }
.br-more {
  display: block; margin: 44px auto 0; padding: 14px 44px; border: 1px solid var(--black, #0a0a0a);
  background: transparent; border-radius: 40px; font-family: var(--font-sans, 'DM Sans', sans-serif);
  font-size: 14px; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s;
}
.br-more:hover { background: var(--black, #0a0a0a); color: #fff; }
.br-more[disabled] { opacity: 0.4; cursor: default; }
.br-empty { text-align: center; padding: 60px 20px; color: var(--text-muted, #6b6b6b); font-family: var(--font-sans, 'DM Sans', sans-serif); }
.br-skel { background: linear-gradient(90deg,#f3efe6 25%,#ece6d8 50%,#f3efe6 75%); background-size: 200% 100%; animation: brsh 1.3s infinite; border-radius: 14px; height: 168px; }
@keyframes brsh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

@media (max-width: 1000px) { .br-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 640px)  { .br-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } .br-hero h1 { font-size: clamp(32px,9vw,48px); } }

<script src="../public/js/api-config.js"></script>
<script>
(function () {
  var API_BASE = window.API_BASE || '';
  var grid = document.getElementById('brGrid');
  var meta = document.getElementById('brMeta');
  var moreBtn = document.getElementById('brMore');
  var totalEl = document.getElementById('brTotal');
  var searchEl = document.getElementById('brSearch');
  var azEl = document.getElementById('brAz');
  var PER = 30;
  var state = { q: '', letter: '', page: 1, total: 0, loading: false };

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }

  // Derive a plausible domain for a brand logo (Clearbit), e.g. "Dolce & Gabbana" -> dolcegabbana.com
  function brandDomain(name) {
    var slug = String(name || '').toLowerCase()
      .replace(/&/g, 'and')
      .replace(/[^a-z0-9]+/g, '');
    return slug ? slug + '.com' : '';
  }

  function cardHtml(b) {
    var dom = brandDomain(b.name);
    var initial = (b.name || '?').trim().charAt(0).toUpperCase();
    var logo = dom
      ? '<img alt="' + esc(b.name) + '" loading="lazy" src="https://logo.clearbit.com/' + dom + '"'
        + ' onerror="this.onerror=null;this.src=\'https://www.google.com/s2/favicons?domain=' + dom + '&sz=128\';'
        + 'this.onerror=function(){this.parentNode.textContent=\'' + esc(initial) + '\';}">'
      : esc(initial);
    var cnt = (b.count != null) ? (Number(b.count).toLocaleString() + ' items') : 'Browse';
    return '<a class="br-card" href="search.html?brand=' + encodeURIComponent(b.name) + '">'
      + '<div class="br-logo">' + logo + '</div>'
      + '<div class="br-name">' + esc(b.name) + '</div>'
      + '<div class="br-cnt">' + cnt + '</div></a>';
  }

  function showSkeletons() {
    var s = '';
    for (var i = 0; i < 10; i++) s += '<div class="br-skel"></div>';
    grid.innerHTML = s;
  }

  function buildAz() {
    var html = '<button data-l="" class="on">All</button>';
    for (var i = 65; i <= 90; i++) html += '<button data-l="' + String.fromCharCode(i) + '">' + String.fromCharCode(i) + '</button>';
    azEl.innerHTML = html;
    azEl.addEventListener('click', function (e) {
      var b = e.target.closest('button'); if (!b) return;
      azEl.querySelectorAll('button').forEach(function (x) { x.classList.remove('on'); });
      b.classList.add('on');
      state.letter = b.getAttribute('data-l') || '';
      state.q = ''; searchEl.value = '';
      state.page = 1; load(true);
    });
  }

  function url() {
    var u = API_BASE + '/api/brands/all?limit=' + PER + '&page=' + state.page;
    if (state.q) u += '&q=' + encodeURIComponent(state.q);
    if (state.letter) u += '&letter=' + encodeURIComponent(state.letter);
    return u;
  }

  function load(reset) {
    if (state.loading) return;
    state.loading = true;
    if (reset) { state.page = 1; showSkeletons(); }
    fetch(url())
      .then(function (r) { return r.ok ? r.json() : { brands: [], total: 0 }; })
      .then(function (d) {
        var items = (d && d.brands) || [];
        state.total = (d && d.total) || 0;
        if (reset) grid.innerHTML = '';
        if (!items.length && reset) {
          grid.innerHTML = '<div class="br-empty">No brands match that. Try another search.</div>';
          meta.textContent = '';
          moreBtn.style.display = 'none';
          state.loading = false;
          return;
        }
        grid.insertAdjacentHTML('beforeend', items.map(cardHtml).join(''));
        var shown = (state.page - 1) * PER + items.length;
        meta.textContent = state.q
          ? ('Showing ' + shown + ' of ' + state.total + ' brands for "' + state.q + '"')
          : (state.letter ? ('Brands starting with ' + state.letter + ' — ' + state.total)
                          : ('Showing ' + shown + ' of ' + state.total.toLocaleString() + ' brands'));
        moreBtn.style.display = (shown < state.total) ? 'block' : 'none';
        if (totalEl && !state.q && !state.letter && state.page === 1) {
          totalEl.textContent = state.total.toLocaleString();
        }
        state.loading = false;
      })
      .catch(function () {
        if (reset) grid.innerHTML = '<div class="br-empty">Could not load brands. Please refresh.</div>';
        state.loading = false;
      });
  }

  moreBtn.addEventListener('click', function () { state.page++; load(false); });
  document.getElementById('brSearchBtn').addEventListener('click', doSearch);
  searchEl.addEventListener('keyup', function (e) { if (e.key === 'Enter') doSearch(); });
  function doSearch() {
    state.q = searchEl.value.trim();
    state.letter = '';
    azEl.querySelectorAll('button').forEach(function (x) { x.classList.remove('on'); });
    var allBtn = azEl.querySelector('button[data-l=""]'); if (allBtn) allBtn.classList.add('on');
    state.page = 1; load(true);
  }

  buildAz();
  load(true);
})();
</script>
